[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "motlab-assets"
version = "0.1.0"
description = "Robot configurations and bundled MJCF assets for MotLab."
license = { text = "Apache-2.0" }
authors = [{ name = "MotLab Contributors" }]
requires-python = ">=3.10,<3.13"
dependencies = [
    "motlab",
]

[tool.hatch.build.targets.wheel]
packages = ["src/motlab_assets"]

[tool.hatch.build.targets.sdist]
include = ["src/motlab_assets"]
