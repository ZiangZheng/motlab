[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "motlab-rl"
version = "0.1.0"
description = "MotLab RL — rsl_rl + skrl PPO trainers for MotLab manager-based environments."
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "MotLab Contributors" }]
requires-python = ">=3.10,<3.13"
dependencies = [
    "motlab",
    "motlab-tasks",
    "absl-py>=2.0",
    "pyyaml>=6",
    "tensorboard>=2.15",
]

[project.optional-dependencies]
rslrl = [
    "rsl-rl-lib==3.1.2",
    "torch>=2.5",
]
skrl = [
    "skrl>=2.0",
    "torch>=2.5",
    "gymnasium>=0.29",
]
test = ["pytest>=8"]

[tool.hatch.build.targets.wheel]
packages = ["src/motlab_rl"]

[tool.hatch.build.targets.sdist]
include = ["src/motlab_rl", "README.md"]
