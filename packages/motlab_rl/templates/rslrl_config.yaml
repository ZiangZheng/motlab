# Reference rsl_rl runner config. Source of truth for fields in
# motlab_rl.rslrl.cfg — keep the two in sync.
num_envs: 1024
algorithm:
  class_name: PPO
  num_learning_epochs: 5
  num_mini_batches: 4
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  clip_param: 0.2
  entropy_coef: 0.01
  learning_rate: 0.001
  schedule: adaptive
  gamma: 0.99
  lam: 0.95
  desired_kl: 0.01
  max_grad_norm: 1.0
policy:
  class_name: ActorCritic
  init_noise_std: 1.0
  actor_hidden_dims: [256, 128]
  critic_hidden_dims: [256, 128]
  activation: elu
runner:
  class_name: OnPolicyRunner
  num_steps_per_env: 24
  max_iterations: 500
  save_interval: 50
  experiment_name: motlab-rslrl
  run_name: ""
  logger: tensorboard
  seed: 42
  empirical_normalization: false
