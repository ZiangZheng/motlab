[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "motlab-envs"
version = "0.1.0"
description = "MotLab environments — task library and engine adapters (MotrixSim) for RL."
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "MotLab Contributors" }]
requires-python = ">=3.10,<3.13"
dependencies = [
    "numpy>=1.26",
    "torch>=2.5",
    "gymnasium==1.1.1",
    "motrixsim>=0.7.0",
    "pyyaml>=6",
]

[project.optional-dependencies]
test = ["pytest>=8"]

[tool.hatch.build.targets.wheel]
packages = ["src/motlab_envs"]

[tool.hatch.build.targets.sdist]
include = ["src/motlab_envs", "README.md"]
